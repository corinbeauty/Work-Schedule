<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手舞足道 - 中清行館排班系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const PASS_MASTER = "1016"; 
        const firebaseConfig = {
            apiKey: "AIzaSyAdjCBcgRvDyv3ApKBGfhDSRrjcDv23Mrw",
            authDomain: "wrok-schedule.firebaseapp.com",
            projectId: "wrok-schedule",
            storageBucket: "wrok-schedule.firebasestorage.app",
            messagingSenderId: "640239028584",
            appId: "1:640239028584:web:adbfd3000029139cd5eedd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const PATH_APP = "shou-wu-zu-dao-main";

        window.db = db; window.auth = auth; window.appId = PATH_APP; window.PASS_MASTER = PASS_MASTER;
        window.fbDoc = doc; window.fbSetDoc = setDoc; window.fbGetDoc = getDoc; window.onSnapshot = onSnapshot;
        window.getRef = (c, id) => doc(db, 'artifacts', window.appId, 'public', 'data', c, id);

        const now = new Date();
        window.currentYear = now.getFullYear(); 
        window.currentMonth = now.getMonth(); 
        window.currentStore = "中清行館";
        window.isAdmin = false; window.schedule = {}; window.staffGroups = []; window.lockedMonths = {}; 
        window.selectedTool = "休"; window.requiredStaff = 14;
        window.showOnlyOff = false; window.customTags = []; 
        window.posMapping = {}; 
        window.currentSelectedColor = "#1e293b";
        window.isAiLoading = false;
        window.undoStack = []; window.redoStack = []; window.HOLIDAY_DB = {};

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); } catch { await signInAnonymously(auth); }
                } else { await signInAnonymously(auth); }
            } catch (err) { console.error("Auth Failed", err); }

            onAuthStateChanged(auth, (user) => {
                if (user) window.enterApp();
            });
        };
        initAuth();

        window.toDateKey = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        :root { --col-name: 80px; --col-shift: 40px; --col-day: 32px; }
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #0f172a; font-size: 0.65rem; }
        .group-row-早 { background-color: #fffdf5 !important; }
        .group-row-中, .group-row-晚 { background-color: #f7fff9 !important; }
        .group-row-夜 { background-color: #fdfaff !important; }

        .time-area-green { background-color: #dcfce7 !important; color: #166534 !important; }
        .time-area-yellow { background-color: #fef9c3 !important; color: #854d0e !important; }
        .time-area-blue { background-color: #dbeafe !important; color: #1e40af !important; }

        .is-holiday-bg { background-color: #fff1f2 !important; }
        .is-holiday-text { color: #f43f5e !important; font-weight: 900; }
        .cell-off { background-color: #fb7185 !important; color: #ffffff !important; font-weight: 900; }
        .cell-custom { color: #ffffff !important; font-weight: 900; }

        .table-wrapper { background: white; border-radius: 10px; box-shadow: 0 1px 15px rgba(0,0,0,0.04); overflow: auto; border: 1px solid #eef2f6; position: relative; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #f1f5f9; text-align: center !important; vertical-align: middle !important; height: 32px; position: relative; padding: 0 !important; }

        .frame-b-name { position: sticky; left: 0; z-index: 50; border-right: 1px solid #e2e8f0; width: var(--col-name) !important; min-width: var(--col-name) !important; background-color: inherit; }
        .frame-a-shift { position: sticky; left: var(--col-name); z-index: 49; border-right: 2px solid #e2e8f0; width: var(--col-shift) !important; min-width: var(--col-shift) !important; background-color: inherit; font-weight: 900; }

        thead .frame-b-name, thead .frame-a-shift { background: #f1f5f9 !important; color: #94a3b8; }

        @keyframes breath-ring { 0%, 100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); border-color: #e2e8f0; } 50% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.4); border-color: #ef4444; } }
        .animate-lock-breath-ring { animation: breath-ring 2s infinite; border: 2px solid #ef4444 !important; }
        .locked-overlay { pointer-events: none; filter: grayscale(0.1); opacity: 0.95; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(8px); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 550px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); overflow: hidden; }
        .stepper-btn { padding: 2px; border-radius: 4px; background: #f1f5f9; transition: all 0.2s; color: #64748b; }
        .vertical-holiday { writing-mode: vertical-rl; text-orientation: upright; font-size: 8px; line-height: 1; height: 45px; display: flex; align-items: center; justify-content: center; width: 100%; font-weight: 900; margin: 0 auto; }
        
        .tag-color-picker { width: 24px; height: 24px; border-radius: 6px; cursor: pointer; border: 2px solid white; box-shadow: 0 0 0 1px #e2e8f0; transition: all 0.2s; }
        .tag-color-picker.active { border-color: #0f172a; transform: scale(1.1); }
        .admin-btn { width: 100%; padding: 12px; margin-bottom: 6px; border-radius: 12px; display: flex; align-items: center; gap: 10px; font-weight: 700; background: #f8fafc; border: 1px solid #f1f5f9; text-align: left; font-size: 0.75rem; }
        
        /* 週期卡片佈局優化 */
        .weekly-card { width: calc(33.33% - 10px); border: 2px solid #000; border-radius: 6px; padding: 4px; margin-bottom: 8px; page-break-inside: avoid; background: #fff; color: black; display: flex; flex-direction: column; min-width: 250px; }
        .weekly-card-header { border-bottom: 2px solid #000; padding-bottom: 2px; margin-bottom: 4px; text-align: center; }
        .weekly-table { width: 100%; border-collapse: collapse; font-size: 9px; table-layout: fixed; }
        .weekly-table th, .weekly-table td { border: 2px solid #000 !important; height: 20px; padding: 0px 1px !important; text-align: center; vertical-align: middle; color: black !important; overflow: hidden; word-break: break-all; }
        .text-red-marker { color: #ff0000 !important; font-weight: 900 !important; font-size: 10px !important; line-height: 1; }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; background: white; margin: 0; }
            .modal-overlay { position: absolute; inset: 0; background: white; z-index: 99999; display: block; overflow: visible; }
            .modal-content { max-width: none; width: 100%; box-shadow: none; border-radius: 0; border: none; overflow: visible; }
            .weekly-grid { display: flex !important; flex-wrap: wrap !important; gap: 6px !important; }
            .weekly-card { width: calc(33.33% - 6px) !important; border: 2px solid black !important; }
            .text-red-marker { color: #ff0000 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { margin: 0.5cm; size: landscape; }
        }
    </style>
</head>
<body class="p-2 md:p-6 bg-slate-50">

    <div id="landingPage" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-[9999]">
        <div class="p-4 rounded-3xl bg-blue-600 animate-pulse mb-6"><i data-lucide="shield-check" class="text-white w-10 h-10"></i></div>
        <h2 class="text-white text-lg font-black tracking-widest uppercase opacity-80">CONNECTED</h2>
    </div>

    <div id="app" class="hidden max-w-[2200px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-4 gap-4 no-print">
            <div class="space-y-2">
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">中清行館 <span class="text-blue-500 font-bold">排班系統</span></h1>
                    <button id="lockStatusBtn" onclick="window.handleLockClick()" class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-full shadow-sm hover:bg-slate-50 transition border-2">
                        <i data-lucide="unlock" id="lockIcon" class="w-3 h-3 text-emerald-500"></i>
                        <span id="lockText" class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">開放中</span>
                    </button>
                </div>
                <div class="flex items-center bg-white p-1 rounded-xl shadow-sm border border-slate-200 w-fit">
                    <button onclick="window.changeMonth(-1)" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                    <span id="monthDisplay" class="px-4 text-sm font-black text-slate-700 min-w-[110px] text-center font-mono"></span>
                    <button onclick="window.changeMonth(1)" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex gap-1 pr-2 border-r border-slate-100">
                    <button id="undoBtn" onclick="window.undo()" class="p-2 rounded-lg hover:bg-slate-50 text-slate-400 transition-all"><i data-lucide="undo-2" class="w-4 h-4"></i></button>
                    <button id="redoBtn" onclick="window.redo()" class="p-2 rounded-lg hover:bg-slate-50 text-slate-400 transition-all"><i data-lucide="redo-2" class="w-4 h-4"></i></button>
                </div>
                <div id="toolbar" class="flex gap-1 overflow-x-auto max-w-[450px] no-scrollbar"></div>
                <button onclick="window.toggleView()" id="viewToggleBtn" class="p-2 rounded-xl border border-slate-200 text-slate-400 hover:bg-slate-50 flex items-center gap-2 px-3 transition-colors">
                    <i data-lucide="eye-off" id="viewIcon" class="w-3.5 h-3.5"></i>
                    <span class="text-[9px] font-black uppercase">精簡</span>
                </button>
                <button id="loginTrigger" onclick="window.handleLoginBtnClick()" class="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-[10px] hover:bg-slate-700 shadow-sm">
                    <i data-lucide="settings" class="w-3.5 h-3.5"></i>
                    <span id="loginLabel">管理</span>
                </button>
            </div>
        </header>

        <div id="tableContainer" class="table-wrapper">
            <table id="mainTable">
                <colgroup id="mainColgroup"></colgroup>
                <thead id="tableHead" class="bg-slate-50"></thead>
                <tbody id="tableBody"></tbody>
                <tfoot id="tableFoot" class="bg-slate-50/50"></tfoot>
            </table>
        </div>

        <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-4 no-print">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2"><i data-lucide="message-square" class="w-3 h-3"></i> 一般記事</p>
                <div id="noteGeneral" class="text-slate-600 font-bold leading-relaxed whitespace-pre-line outline-none text-xs min-h-[80px]" contenteditable="true" onblur="window.saveNotes('general')">讀取中...</div>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-2 flex items-center gap-2"><i data-lucide="users" class="w-3 h-3"></i> 員工記事</p>
                <div id="noteStaff" class="text-slate-600 font-bold leading-relaxed whitespace-pre-line outline-none text-xs min-h-[80px]" contenteditable="true" onblur="window.saveNotes('staff')">讀取中...</div>
            </div>
            <div class="bg-rose-50/30 p-4 rounded-2xl border border-rose-100 shadow-sm transition-all hover:shadow-md">
                <p class="text-[9px] font-black text-rose-400 uppercase tracking-widest mb-2 flex items-center gap-2"><i data-lucide="shield-alert" class="w-3 h-3"></i> 主管記事</p>
                <div id="noteAdmin" class="text-slate-600 font-bold leading-relaxed whitespace-pre-line outline-none text-xs min-h-[80px]" contenteditable="true" onblur="window.saveNotes('admin')">讀取中...</div>
            </div>
        </div>

        <div class="mt-4 flex justify-end no-print">
            <div id="adminStatusBar" class="md:w-56 bg-white border border-slate-200 rounded-2xl p-4 flex flex-col justify-center">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <div id="statusDot" class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                        <span id="statusLabel" class="text-[9px] font-black text-slate-400 uppercase">Connected</span>
                    </div>
                    <span class="text-[8px] text-slate-300 font-bold uppercase tracking-widest">v7.4.PRO</span>
                </div>
                <div class="flex justify-between items-center">
                    <span id="syncTime" class="text-[10px] font-bold text-slate-600 font-mono truncate">STANDBY</span>
                    <button id="quickLogoutBtn" onclick="window.logout()" class="hidden bg-rose-50 text-rose-500 p-1 rounded-lg hover:bg-rose-100 shadow-sm ml-2"><i data-lucide="log-out" class="w-3.5 h-3.5"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden" onclick="window.closeModal()">
        <div id="modalBox" class="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const PRESET_COLORS = ["#1e293b", "#ef4444", "#f59e0b", "#10b981", "#3b82f6", "#8b5cf6", "#ec4899", "#64748b"];

        window.getTimeAreaClass = (val) => {
            if (val === "0800-1530") return "time-area-green";
            if (val === "1630-1830") return "time-area-yellow";
            if (val === "1930-2350") return "time-area-blue";
            return "";
        };

        window.pushToUndo = () => {
            window.undoStack.push(JSON.stringify(window.schedule));
            if (window.undoStack.length > 50) window.undoStack.shift();
            window.redoStack = []; window.updateHistoryButtons();
        };

        window.undo = async () => {
            if (window.undoStack.length === 0) return;
            window.redoStack.push(JSON.stringify(window.schedule));
            window.schedule = JSON.parse(window.undoStack.pop());
            await window.saveToFirebase(); window.render(); window.updateHistoryButtons();
        };

        window.redo = async () => {
            if (window.redoStack.length === 0) return;
            window.undoStack.push(JSON.stringify(window.schedule));
            window.schedule = JSON.parse(window.redoStack.pop());
            await window.saveToFirebase(); window.render(); window.updateHistoryButtons();
        };

        window.updateHistoryButtons = () => {
            const u = document.getElementById('undoBtn');
            const r = document.getElementById('redoBtn');
            if(u) u.disabled = window.undoStack.length === 0;
            if(r) r.disabled = window.redoStack.length === 0;
        };

        window.toggleView = () => {
            window.showOnlyOff = !window.showOnlyOff;
            const btn = document.getElementById('viewToggleBtn');
            btn.classList.toggle('text-blue-500', window.showOnlyOff);
            document.getElementById('viewIcon').setAttribute('data-lucide', window.showOnlyOff ? 'eye' : 'eye-off');
            window.render(); lucide.createIcons();
        };

        window.enterApp = async () => {
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            window.render(); await window.loadData();
        };

        window.loadData = async () => {
            if (!auth.currentUser) return;
            const mKey = `${window.currentYear}-${window.currentMonth + 1}`;
            const errorFn = (err) => console.error("Firebase Error:", err);

            window.onSnapshot(window.getRef('main_schedule', `current_${window.currentStore}`), s => { 
                window.schedule = s.data()?.schedule || {}; window.render(); 
            }, errorFn);

            window.onSnapshot(window.getRef('personnel_config', `${mKey}_${window.currentStore}`), s => { 
                if(s.exists()){ 
                    window.staffGroups = s.data()?.staffGroups || []; 
                    window.requiredStaff = s.data()?.requiredStaffCount || 14; 
                    window.render(); 
                }
            }, errorFn);

            window.onSnapshot(window.getRef('holiday_config', `current_${window.currentStore}`), s => { 
                if(s.exists()) { window.HOLIDAY_DB = s.data().data || {}; window.render(); }
            }, errorFn);

            window.onSnapshot(window.getRef('lock_state', 'current'), s => { 
                window.lockedMonths = s.data()?.data || {}; window.render(); 
            }, errorFn);

            window.onSnapshot(window.getRef('footer_notes', `current_${window.currentStore}`), s => { 
                if(s.exists()) {
                    const data = s.data();
                    const ids = ['noteGeneral', 'noteStaff', 'noteAdmin'];
                    const keys = ['general', 'staff', 'admin'];
                    ids.forEach((id, i) => {
                        const el = document.getElementById(id);
                        if (document.activeElement !== el) el.innerText = data[keys[i]] || "";
                    });
                }
            }, errorFn);

            window.onSnapshot(window.getRef('custom_tags', 'current'), s => { 
                window.customTags = s.data()?.tags || []; window.renderToolbar(); window.render(); 
            }, errorFn);

            window.onSnapshot(window.getRef('pos_mapping', 'current'), s => {
                window.posMapping = s.data()?.mapping || {};
            }, errorFn);
        };

        window.saveToFirebase = async () => {
            if (!auth.currentUser) return;
            await window.fbSetDoc(window.getRef('main_schedule', `current_${window.currentStore}`), { schedule: window.schedule });
            document.getElementById('syncTime').innerText = `${new Date().toLocaleTimeString()} SYNC`;
        };

        window.adjReq = async (v) => {
            if(!window.isAdmin) return;
            window.requiredStaff = Math.max(1, window.requiredStaff + v);
            const mKey = `${window.currentYear}-${window.currentMonth + 1}`;
            await window.fbSetDoc(window.getRef('personnel_config', `${mKey}_${window.currentStore}`), { 
                staffGroups: window.staffGroups, 
                requiredStaffCount: window.requiredStaff 
            });
            window.render();
        };

        window.render = () => {
            const days = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
            const lockKey = `${window.currentYear}-${window.currentMonth + 1}`;
            const isLocked = !!window.lockedMonths[lockKey];
            const lockBtn = document.getElementById('lockStatusBtn');
            const tableCont = document.getElementById('tableContainer');
            
            document.getElementById('monthDisplay').innerText = `${window.currentYear} / ${String(window.currentMonth + 1).padStart(2,'0')}`;

            if(isLocked) {
                document.getElementById('lockIcon').setAttribute('data-lucide', 'lock');
                document.getElementById('lockText').innerText = "已鎖定編輯";
                document.getElementById('lockText').className = "text-[11px] font-black text-rose-600 uppercase";
                lockBtn.classList.add('animate-lock-breath-ring');
                tableCont.classList.add('locked-overlay');
            } else {
                document.getElementById('lockIcon').setAttribute('data-lucide', 'unlock');
                document.getElementById('lockText').innerText = "開放中";
                document.getElementById('lockText').className = "text-[11px] font-black text-slate-500 uppercase";
                lockBtn.classList.remove('animate-lock-breath-ring');
                tableCont.classList.remove('locked-overlay');
            }

            const loginBtn = document.getElementById('loginTrigger');
            if(window.isAdmin) {
                document.getElementById('statusLabel').innerText = "管理模式";
                document.getElementById('quickLogoutBtn').classList.remove('hidden');
                document.getElementById('loginLabel').innerText = "管理者";
                loginBtn.classList.replace('bg-slate-800', 'bg-emerald-600');
            } else {
                document.getElementById('statusLabel').innerText = "Connected";
                document.getElementById('quickLogoutBtn').classList.add('hidden');
                document.getElementById('loginLabel').innerText = "管理";
                loginBtn.classList.replace('bg-emerald-600', 'bg-slate-800');
            }

            let colHtml = `<col style="width: var(--col-name);"><col style="width: var(--col-shift);">`;
            for(let i=1; i<=days; i++) colHtml += `<col style="width: var(--col-day);">`;
            colHtml += `<col style="width: 35px;">`;
            document.getElementById('mainColgroup').innerHTML = colHtml;

            const totalStaff = window.staffGroups.reduce((acc, g) => acc + (g.members?.length || 0), 0);
            
            const gap = window.requiredStaff - totalStaff;
            let h0 = `<tr><th rowspan="3" class="frame-b-name text-center">
                <div class="flex flex-col gap-0.5 p-0.5 text-[7.5px] font-bold leading-tight w-full h-full justify-center">
                    <div class="flex justify-between items-center bg-slate-50 p-1 rounded border border-slate-200 mx-0.5">
                        <span>應有</span>
                        <div class="flex items-center gap-0.5">
                            ${window.isAdmin ? `<button onclick="window.adjReq(-1)" class="stepper-btn no-print"><i data-lucide="minus" class="w-2 h-2"></i></button>` : ''}
                            <span class="w-3 text-center font-black text-blue-600">${window.requiredStaff}</span>
                            ${window.isAdmin ? `<button onclick="window.adjReq(1)" class="stepper-btn no-print"><i data-lucide="plus" class="w-2 h-2"></i></button>` : ''}
                        </div>
                    </div>
                    <div class="flex justify-between px-1.5 py-0.5"><span>現有</span><span>${totalStaff}</span></div>
                    <div class="flex justify-between px-1.5 py-0.5 border-t border-slate-100">
                        <span>缺額</span>
                        <span class="${gap > 0 ? 'text-rose-500' : 'text-emerald-500'} font-black">${gap}</span>
                    </div>
                </div>
            </th><th rowspan="3" class="frame-a-shift text-center">班</th>`;
            let h1 = `<tr>`; let h2 = `<tr>`;

            for(let d=1; d<=days; d++) {
                const date = new Date(window.currentYear, window.currentMonth, d);
                const ds = window.toDateKey(date);
                const hData = window.HOLIDAY_DB[ds] || { n: "", r: false };
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const colClass = (hData.r || isWeekend) ? 'is-holiday-bg' : '';
                const txtClass = (hData.r || isWeekend) ? 'is-holiday-text' : 'text-slate-400 font-bold';
                h0 += `<th class="${colClass} ${txtClass} text-center" ${window.isAdmin ? `onclick="window.handleMainHolidayClick('${ds}')"` : ''}><div class="vertical-holiday">${hData.n}</div></th>`;

        window.generateWeeklyPrint = () => {
            const startStr = document.getElementById('printStart').value;
            const endStr = document.getElementById('printEnd').value;
            if (!startStr || !endStr) return;
            const start = new Date(startStr); const end = new Date(endStr);
            let cardsHtml = "";
            
            const getGroupNameOfMember = (name) => {
                const grpObj = window.staffGroups.find(g => g.members.includes(name));
                return grpObj ? grpObj.group : "";
            };

            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                const ds = window.toDateKey(d);
                const dayName = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"][d.getDay()];
                const hData = window.HOLIDAY_DB[ds] || { n: "", r: false };
                const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                let offList = []; 
                let onDutyRaw = [];
                window.staffGroups.forEach(g => g.members.forEach(m => {
                    const shift = window.schedule[ds]?.[m] || "";
                    if (['休', '排休', '特', '補'].includes(shift)) offList.push(m);
                    else if (shift) onDutyRaw.push({ name: m, time: shift });
                }));

                let groupedOnDuty = [];
                let i = 0;
                while(i < onDutyRaw.length) {
                    const current = onDutyRaw[i];
                    const next = onDutyRaw[i+1];
                    const curGrp = getGroupNameOfMember(current.name);
                    const isSpecialGroup = curGrp.includes("鯰魚") || curGrp.includes("野雁");

                    if (isSpecialGroup && next && current.time === next.time && curGrp === getGroupNameOfMember(next.name)) {
                        groupedOnDuty.push({ names: [current.name, next.name], time: current.time });
                        i += 2;
                    } else {
                        groupedOnDuty.push({ names: [current.name], time: current.time });
                        i++;
                    }
                }

                const titleColor = (hData.r || isWeekend) ? 'text-rose-600' : 'text-slate-800';
                let rowHtml = ""; let cM=1, cA=1, cE=1;
                
                for (let j = 0; j < 10; j++) { 
                    const staffSet = groupedOnDuty[j] || { names: [""], time: "" };
                    const timeObj = window.formatShiftTime(staffSet.time);
                    
                    let mM_vals=[], mA_vals=[], mE_vals=[];
                    staffSet.names.forEach(n => {
                        if(n && timeObj.startNum !== null) {
                            if(timeObj.startNum >= 800 && timeObj.startNum <= 1530) mM_vals.push(cM++);
                            if(timeObj.startNum >= 1430 && timeObj.startNum <= 2100) mA_vals.push(cA++);
                            if(timeObj.startNum >= 1730 && timeObj.startNum <= 2350) mE_vals.push(cE++);
                        }
                    });

                    const displayName = staffSet.names.filter(n => n).join('、');
                    const displayPos = staffSet.names.filter(n => n).map(n => window.posMapping[n] || "").join('、');

                    rowHtml += `
                        <tr>
                            <td contenteditable="true" style="font-family: monospace;">${timeObj.display==="--"?"":timeObj.display}</td>
                            <td contenteditable="true" style="font-weight:bold; width: 100px;">${displayName}</td>
                            <td contenteditable="true">${displayPos}</td>
                            <td contenteditable="true"><span class="text-red-marker">${mM_vals.join(',')}</span></td>
                            <td contenteditable="true"><span class="text-red-marker">${mA_vals.join(',')}</span></td>
                            <td contenteditable="true"><span class="text-red-marker">${mE_vals.join(',')}</span></td>

                            <div class="border-t border-black pt-1 leading-tight" contenteditable="true">休：<span class="font-bold">${offList.join('、') || '無'}</span></div>
                            <div class="text-right mt-1 font-bold" contenteditable="true">發券：_______</div>
                        </div>
                    </div>`;
            }

            lucide.createIcons();

        window.formatShiftTime = (raw) => {
            if(!raw || raw === "--") return { display: "--", startNum: null };
            let s = raw.split('-')[0].replace(':', '').trim(); 
            if(s.length < 4) return { display: raw, startNum: null };
            let hh = parseInt(s.substring(0,2));
            let mm = parseInt(s.substring(2,4));
            let startT = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
            let totalMin = hh * 60 + mm + 510;
            let endT = `${String(Math.floor(totalMin/60)%24).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
            return { display: `${startT}~${endT}`, startNum: parseInt(s) };
        };

        // V1 Modification: 最佳化記事欄位儲存邏輯，使用 merge: true 確保各別更新不互相覆蓋
        window.saveNotes = async (field) => { 
            if (!auth.currentUser) return; 
            const ref = window.getRef('footer_notes', `current_${window.currentStore}`); 
            const elId = field === 'general' ? 'noteGeneral' : (field === 'staff' ? 'noteStaff' : 'noteAdmin');
            const val = document.getElementById(elId).innerText;
            
            // 使用 setDoc 搭配 merge: true，只更新變動的欄位，達成「各別回存」的需求
            await window.fbSetDoc(ref, { [field]: val }, { merge: true }); 
            document.getElementById('syncTime').innerText = `${new Date().toLocaleTimeString()} NOTE SAVED`;
        };
        
        window.changeMonth = async (v) => { window.currentMonth += v; if(window.currentMonth>11){window.currentMonth=0;window.currentYear++;} if(window.currentMonth<0){window.currentMonth=11;window.currentYear--;} window.render(); await window.loadData(); };
    </script>
</body>
