<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手舞足道 - 中清行館排班系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const PASS_MASTER = "1016"; 
        const firebaseConfig = {
            apiKey: "AIzaSyAdjCBcgRvDyv3ApKBGfhDSRrjcDv23Mrw",
            authDomain: "wrok-schedule.firebaseapp.com",
            projectId: "wrok-schedule",
            storageBucket: "wrok-schedule.firebasestorage.app",
            messagingSenderId: "640239028584",
            appId: "1:640239028584:web:adbfd3000029139cd5eedd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const PATH_APP = "shou-wu-zu-dao-main";

        window.db = db; window.auth = auth; window.appId = PATH_APP; window.PASS_MASTER = PASS_MASTER;
        window.fbDoc = doc; window.fbSetDoc = setDoc; window.fbGetDoc = getDoc; window.onSnapshot = onSnapshot;
        window.getRef = (c, id) => doc(db, 'artifacts', window.appId, 'public', 'data', c, id);

        const now = new Date();
        window.currentYear = now.getFullYear(); 
        window.currentMonth = now.getMonth(); 
        window.currentStore = "中清行館";
        window.isAdmin = false; window.schedule = {}; window.staffGroups = []; window.lockedMonths = {}; 
        window.selectedTool = "休"; window.requiredStaff = 14;
        window.showOnlyOff = false; window.customTags = []; 
        window.posMapping = {}; 
        window.currentSelectedColor = "#1e293b";
        window.undoStack = []; window.redoStack = []; window.HOLIDAY_DB = {};
        window.draggedMember = null;
        
        window.unsubs = [];

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); } catch { await signInAnonymously(auth); }
                } else { await signInAnonymously(auth); }
            } catch (err) { console.error("Auth Failed", err); }

            onAuthStateChanged(auth, (user) => {
                if (user) window.enterApp();
            });
        };
        initAuth();

        window.toDateKey = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        /* 精確縮減寬度以利於一頁顯示 */
        :root { --col-name: 90px; --col-shift: 34px; --col-day: 28px; }
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; color: #0f172a; font-size: 0.65rem; }
        
        .group-row-早 { background-color: #fffdf5 !important; }
        .group-row-中, .group-row-晚 { background-color: #f7fff9 !important; }
        .group-row-夜 { background-color: #fdfaff !important; }

        .time-area-green { background-color: #dcfce7 !important; color: #166534 !important; }
        .time-area-yellow { background-color: #fef9c3 !important; color: #854d0e !important; }
        .time-area-blue { background-color: #dbeafe !important; color: #1e40af !important; }

        .is-holiday-bg { background-color: #fff1f2 !important; }
        .is-holiday-text { color: #f43f5e !important; font-weight: 900; }
        .cell-off { background-color: #fb7185 !important; color: #ffffff !important; font-weight: 900; }
        .cell-custom { color: #ffffff !important; font-weight: 900; }

        .table-wrapper { background: white; border-radius: 10px; box-shadow: 0 1px 15px rgba(0,0,0,0.04); overflow: auto; border: 1px solid #eef2f6; position: relative; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #f1f5f9; text-align: center !important; vertical-align: middle !important; height: 32px; position: relative; padding: 0 !important; }

        .frame-b-name { position: sticky; left: 0; z-index: 50; border-right: 1px solid #e2e8f0; width: var(--col-name) !important; min-width: var(--col-name) !important; background-color: inherit; text-align: center; padding: 0 4px !important; }
        .frame-a-shift { position: sticky; left: var(--col-name); z-index: 49; border-right: 2px solid #e2e8f0; width: var(--col-shift) !important; min-width: var(--col-shift) !important; background-color: inherit; font-weight: 900; text-align: center; }

        thead .frame-b-name, thead .frame-a-shift { background: #f1f5f9 !important; color: #94a3b8; }

        @keyframes alert-blink { 0%, 100% { opacity: 1; color: #f43f5e; } 50% { opacity: 0.3; color: transparent; } }
        .animate-alert-blink { animation: alert-blink 0.8s infinite; font-weight: 900; }

        @keyframes breath-ring { 0%, 100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); border-color: #e2e8f0; } 50% { box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.4); border-color: #ef4444; } }
        .animate-lock-breath-ring { animation: breath-ring 2s infinite; border: 2px solid #ef4444 !important; }
        .locked-overlay { pointer-events: none; filter: grayscale(0.1); opacity: 0.95; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(8px); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 550px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.4); overflow: hidden; }
        .stepper-btn { padding: 2px; border-radius: 4px; background: #f1f5f9; transition: all 0.2s; color: #64748b; }
        
        .vertical-holiday { writing-mode: vertical-rl; text-orientation: upright; font-size: 8px; line-height: 1.1; height: 45px; display: flex; align-items: center; justify-content: center; width: 100%; font-weight: 900; margin: 0 auto; transition: background 0.2s; }
        
        .staff-action-btn { opacity: 0; transition: opacity 0.2s; }
        tr:hover .staff-action-btn { opacity: 1; }

        .admin-btn { width: 100%; padding: 14px; margin-bottom: 8px; border-radius: 12px; display: flex; align-items: center; gap: 12px; font-weight: 700; background: #f8fafc; border: 1px solid #f1f5f9; text-align: left; font-size: 0.8rem; transition: all 0.2s; }
        .admin-btn:hover { background: #f1f5f9; transform: translateX(4px); }

        .text-red-marker { color: #ff0000 !important; font-weight: 900 !important; -webkit-print-color-adjust: exact !important; }

        .weekly-card { width: calc(33.33% - 10px); border: 2px solid #000; border-radius: 6px; padding: 4px; margin-bottom: 8px; page-break-inside: avoid; background: #fff; color: black; display: flex; flex-direction: column; min-width: 250px; }
        .weekly-card-header { border-bottom: 2px solid #000; padding-bottom: 2px; margin-bottom: 4px; text-align: center; }
        .weekly-table { width: 100%; border-collapse: collapse; font-size: 9px; table-layout: fixed; }
        .weekly-table th, .weekly-table td { border: 2px solid #000 !important; height: 22px; padding: 0px 2px !important; text-align: center; vertical-align: middle; color: black !important; overflow: hidden; word-break: break-all; }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; background: white; margin: 0; }
            .modal-overlay { position: absolute; inset: 0; background: white; z-index: 99999; display: block; overflow: visible; }
            .modal-content { max-width: none; width: 100%; box-shadow: none; border-radius: 0; border: none; overflow: visible; }
            .weekly-grid { display: flex !important; flex-wrap: wrap !important; gap: 6px !important; }
            .weekly-card { width: calc(33.33% - 6px) !important; border: 2px solid black !important; }
            .text-red-marker { color: #ff0000 !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { margin: 0.5cm; size: landscape; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-2 md:p-4 bg-slate-50">

    <div id="landingPage" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-[9999]">
        <div class="p-4 rounded-3xl bg-blue-600 animate-pulse mb-6"><i data-lucide="shield-check" class="text-white w-10 h-10"></i></div>
        <h2 class="text-white text-lg font-black tracking-widest uppercase opacity-80">CONNECTED</h2>
    </div>

    <div id="app" class="hidden max-w-[2200px] mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-4 gap-4 no-print">
            <div class="space-y-2">
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">中清行館 <span class="text-blue-500 font-bold">排班系統</span></h1>
                    <button id="lockStatusBtn" onclick="window.handleLockClick()" class="flex items-center gap-2 bg-white border border-slate-200 px-3 py-1.5 rounded-full shadow-sm hover:bg-slate-50 transition border-2">
                        <i data-lucide="unlock" id="lockIcon" class="w-3 h-3 text-emerald-500"></i>
                        <span id="lockText" class="text-[9px] font-black text-slate-500 uppercase tracking-tighter">開放中</span>
                    </button>
                </div>
                <div class="flex items-center bg-white p-1 rounded-xl shadow-sm border border-slate-200 w-fit">
                    <button onclick="window.changeMonth(-1)" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                    <span id="monthDisplay" class="px-4 text-sm font-black text-slate-700 min-w-[110px] text-center font-mono"></span>
                    <button onclick="window.changeMonth(1)" class="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-white p-1.5 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex gap-1 pr-2 border-r border-slate-100">
                    <button id="undoBtn" onclick="window.undo()" class="p-2 rounded-lg hover:bg-slate-50 text-slate-400 transition-all"><i data-lucide="undo-2" class="w-4 h-4"></i></button>
                    <button id="redoBtn" onclick="window.redo()" class="p-2 rounded-lg hover:bg-slate-50 text-slate-400 transition-all"><i data-lucide="redo-2" class="w-4 h-4"></i></button>
                </div>
                <div id="toolbar" class="grid grid-rows-2 grid-flow-col gap-1 overflow-x-auto max-w-[300px] md:max-w-[500px] lg:max-w-[800px] no-scrollbar scroll-smooth py-1 px-1 min-h-[75px]"></div>
                <button onclick="window.toggleView()" id="viewToggleBtn" class="p-2 rounded-xl border border-slate-200 text-slate-400 hover:bg-slate-50 flex items-center gap-2 px-3 transition-colors">
                    <i data-lucide="eye-off" id="viewIcon" class="w-3.5 h-3.5"></i>
                    <span class="text-[9px] font-black uppercase">精簡</span>
                </button>
                <button id="loginTrigger" onclick="window.handleLoginBtnClick()" class="flex items-center gap-2 bg-slate-800 text-white px-4 py-2 rounded-xl font-bold text-[10px] hover:bg-slate-700 shadow-sm">
                    <i data-lucide="settings" class="w-3.5 h-3.5"></i>
                    <span id="loginLabel">管理</span>
                </button>
            </div>
        </header>

        <div id="tableContainer" class="table-wrapper">
            <table id="mainTable">
                <colgroup id="mainColgroup"></colgroup>
                <thead id="tableHead" class="bg-slate-50"></thead>
                <tbody id="tableBody"></tbody>
                <tfoot id="tableFoot" class="bg-slate-50/50 font-black"></tfoot>
            </table>
        </div>

        <div class="mt-4 grid grid-cols-1 md:grid-cols-3 gap-4 no-print">
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2 flex items-center gap-2"><i data-lucide="message-square" class="w-3 h-3"></i> 一般記事</p>
                <div id="noteGeneral" class="text-slate-600 font-bold leading-relaxed whitespace-pre-line outline-none text-xs min-h-[60px]" contenteditable="true" onblur="window.saveNotes('general')"></div>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm transition-all hover:shadow-md">
                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-2 flex items-center gap-2"><i data-lucide="users" class="w-3 h-3"></i> 員工記事</p>
                <div id="noteStaff" class="text-slate-600 font-bold leading-relaxed whitespace-pre-line outline-none text-xs min-h-[60px]" contenteditable="true" onblur="window.saveNotes('staff')"></div>
            </div>
            <div class="bg-rose-50/30 p-4 rounded-2xl border border-rose-100 shadow-sm transition-all hover:shadow-md">
                <p class="text-[9px] font-black text-rose-400 uppercase tracking-widest mb-2 flex items-center gap-2"><i data-lucide="shield-alert" class="w-3 h-3"></i> 主管記事</p>
                <div id="noteAdmin" class="text-slate-600 font-bold leading-relaxed whitespace-pre-line outline-none text-xs min-h-[60px]" contenteditable="true" onblur="window.saveNotes('admin')"></div>
            </div>
        </div>

        <div class="mt-4 flex justify-end no-print">
            <div id="adminStatusBar" class="md:w-56 bg-white border border-slate-200 rounded-2xl p-4 flex flex-col justify-center">
                <div class="flex items-center justify-between mb-1">
                    <div class="flex items-center gap-2">
                        <div id="statusDot" class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></div>
                        <span id="statusLabel" class="text-[9px] font-black text-slate-400 uppercase">Connected</span>
                    </div>
                    <span class="text-[8px] text-slate-300 font-bold uppercase tracking-widest">v7.4.PRO</span>
                </div>
                <div class="flex justify-between items-center">
                    <span id="syncTime" class="text-[10px] font-bold text-slate-600 font-mono truncate">STANDBY</span>
                    <button id="quickLogoutBtn" onclick="window.logout()" class="hidden bg-rose-50 text-rose-500 p-1 rounded-lg hover:bg-rose-100 shadow-sm ml-2"><i data-lucide="log-out" class="w-3.5 h-3.5"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="modal-overlay hidden" onclick="window.closeModal()">
        <div id="modalBox" class="modal-content" onclick="event.stopPropagation()"></div>
    </div>

    <script>
        const PRESET_COLORS = ["#1e293b", "#ef4444", "#f59e0b", "#10b981", "#3b82f6", "#8b5cf6", "#ec4899", "#64748b"];

        window.getTimeAreaClass = (val) => {
            if (val === "0800-1530") return "time-area-green";
            if (val === "1630-1830") return "time-area-yellow";
            if (val === "1930-2350") return "time-area-blue";
            return "";
        };

        window.pushToUndo = () => {
            window.undoStack.push(JSON.stringify(window.schedule));
            if (window.undoStack.length > 50) window.undoStack.shift();
            window.redoStack = []; window.updateHistoryButtons();
        };

        window.undo = async () => {
            if (window.undoStack.length === 0) return;
            window.redoStack.push(JSON.stringify(window.schedule));
            window.schedule = JSON.parse(window.undoStack.pop());
            await window.saveToFirebase(); window.render(); window.updateHistoryButtons();
        };

        window.redo = async () => {
            if (window.redoStack.length === 0) return;
            window.undoStack.push(JSON.stringify(window.schedule));
            window.schedule = JSON.parse(window.redoStack.pop());
            await window.saveToFirebase(); window.render(); window.updateHistoryButtons();
        };

        window.updateHistoryButtons = () => {
            const u = document.getElementById('undoBtn');
            const r = document.getElementById('redoBtn');
            if(u) u.disabled = window.undoStack.length === 0;
            if(r) r.disabled = window.redoStack.length === 0;
        };

        window.toggleView = () => {
            window.showOnlyOff = !window.showOnlyOff;
            const btn = document.getElementById('viewToggleBtn');
            btn.classList.toggle('text-blue-500', window.showOnlyOff);
            document.getElementById('viewIcon').setAttribute('data-lucide', window.showOnlyOff ? 'eye' : 'eye-off');
            window.render(); lucide.createIcons();
        };

        window.enterApp = async () => {
            document.getElementById('landingPage').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            window.render(); await window.loadData();
        };

        window.loadData = async () => {
            if (!auth.currentUser) return;
            const mKey = `${window.currentYear}-${window.currentMonth + 1}`;
            const errorFn = (err) => console.error("Firebase Error:", err);

            if (window.unsubs) { window.unsubs.forEach(un => un()); window.unsubs = []; }

            const unsubSchedule = window.onSnapshot(window.getRef('main_schedule', `current_${window.currentStore}`), s => { 
                window.schedule = s.data()?.schedule || {}; window.render(); 
            }, errorFn);
            window.unsubs.push(unsubSchedule);

            const unsubPersonnel = window.onSnapshot(window.getRef('personnel_config', `${mKey}_${window.currentStore}`), s => { 
                if(s.exists()){ 
                    window.staffGroups = s.data()?.staffGroups || []; 
                    window.requiredStaff = s.data()?.requiredStaffCount || 14; 
                    window.render(); 
                } else {
                    window.staffGroups = []; window.render();
                }
            }, errorFn);
            window.unsubs.push(unsubPersonnel);

            const unsubHoliday = window.onSnapshot(window.getRef('holiday_config', `current_${window.currentStore}`), s => { 
                if(s.exists()) { window.HOLIDAY_DB = s.data().data || {}; window.render(); }
            }, errorFn);
            window.unsubs.push(unsubHoliday);

            const unsubLock = window.onSnapshot(window.getRef('lock_state', 'current'), s => { 
                window.lockedMonths = s.data()?.data || {}; window.render(); 
            }, errorFn);
            window.unsubs.push(unsubLock);

            const unsubNotes = window.onSnapshot(window.getRef('footer_notes', `current_${window.currentStore}`), s => { 
                if(s.exists()) {
                    const data = s.data();
                    const keys = ['general', 'staff', 'admin'];
                    const ids = ['noteGeneral', 'noteStaff', 'noteAdmin'];
                    ids.forEach((id, i) => {
                        const el = document.getElementById(id);
                        if (el && document.activeElement !== el) el.innerText = data[keys[i]] || "";
                    });
                }
            }, errorFn);
            window.unsubs.push(unsubNotes);

            const unsubTags = window.onSnapshot(window.getRef('custom_tags', 'current'), s => { 
                window.customTags = s.data()?.tags || []; window.renderToolbar(); window.render(); 
            }, errorFn);
            window.unsubs.push(unsubTags);

            const unsubPos = window.onSnapshot(window.getRef('pos_mapping', 'current'), s => {
                window.posMapping = s.data()?.mapping || {};
            }, errorFn);
            window.unsubs.push(unsubPos);
        };

        window.saveToFirebase = async () => {
            if (!auth.currentUser || Object.keys(window.schedule).length === 0) return;
            await window.fbSetDoc(window.getRef('main_schedule', `current_${window.currentStore}`), { schedule: window.schedule });
            document.getElementById('syncTime').innerText = `${new Date().toLocaleTimeString()} SYNC`;
        };

        window.savePersonnel = async () => {
            if (!auth.currentUser) return;
            const mKey = `${window.currentYear}-${window.currentMonth + 1}`;
            await window.fbSetDoc(window.getRef('personnel_config', `${mKey}_${window.currentStore}`), { 
                staffGroups: window.staffGroups, 
                requiredStaffCount: window.requiredStaff 
            });
        };

        window.adjReq = async (v) => {
            if(!window.isAdmin) return;
            window.requiredStaff = Math.max(1, window.requiredStaff + v);
            await window.savePersonnel();
            window.render();
        };

        window.handleMainHolidayClick = async (ds) => {
            if(!window.isAdmin) return;
            const current = window.HOLIDAY_DB[ds] || { n: "", r: false };
            const box = document.getElementById('modalBox');
            box.style.maxWidth = "400px";
            
            let tagsHtml = window.customTags.map(t => `<button onclick="window.applyHolidayTag('${ds}', '${t.text}')" class="p-3 bg-slate-50 border rounded-xl font-bold text-xs hover:bg-slate-100 text-slate-700">${t.text}</button>`).join('');
            
            box.innerHTML = `
                <div class="bg-slate-800 p-4 flex items-center justify-between text-white"><div class="font-black text-sm">點選標記貼上</div><button onclick="window.closeModal()"><i data-lucide="x"></i></button></div>
                <div class="p-6 space-y-4">
                    <div class="grid grid-cols-3 gap-2">${tagsHtml || '<p class="col-span-3 text-center py-4 text-slate-300">無標記可選</p>'}</div>
                    <div class="flex gap-2">
                        <input type="text" id="manualHoliday" placeholder="或手動輸入" class="flex-1 bg-slate-50 border p-3 rounded-xl text-xs font-bold" value="${current.n}">
                        <button onclick="window.applyHolidayTag('${ds}', document.getElementById('manualHoliday').value)" class="bg-slate-900 text-white px-4 rounded-xl font-bold text-xs">貼上</button>
                    </div>
                    <div class="flex gap-2 pt-2 border-t">
                        <button onclick="window.toggleHolidayRed('${ds}')" class="flex-1 py-3 border border-rose-200 text-rose-500 rounded-xl font-bold text-xs">切換紅字標記</button>
                        <button onclick="window.applyHolidayTag('${ds}', '')" class="flex-1 py-3 bg-slate-100 text-slate-500 rounded-xl font-bold text-xs">清除標記</button>
                    </div>
                </div>`;
            document.getElementById('modalOverlay').classList.remove('hidden');
            lucide.createIcons();
        };

        window.applyHolidayTag = async (ds, text) => {
            const current = window.HOLIDAY_DB[ds] || { n: "", r: false };
            window.HOLIDAY_DB[ds] = { ...current, n: text };
            await window.fbSetDoc(window.getRef('holiday_config', `current_${window.currentStore}`), { data: window.HOLIDAY_DB });
            window.closeModal(); window.render();
        };

        window.toggleHolidayRed = async (ds) => {
            const current = window.HOLIDAY_DB[ds] || { n: "", r: false };
            window.HOLIDAY_DB[ds] = { ...current, r: !current.r };
            await window.fbSetDoc(window.getRef('holiday_config', `current_${window.currentStore}`), { data: window.HOLIDAY_DB });
            window.closeModal(); window.render();
        };

        window.render = () => {
            const days = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
            const lockKey = `${window.currentYear}-${window.currentMonth + 1}`;
            const isLocked = !!window.lockedMonths[lockKey];
            const lockBtn = document.getElementById('lockStatusBtn');
            const tableCont = document.getElementById('tableContainer');
            
            document.getElementById('monthDisplay').innerText = `${window.currentYear} / ${String(window.currentMonth + 1).padStart(2,'0')}`;

            if(isLocked) {

                const visibleMembers = g.members.filter(m => !hiddenList.includes(m));

                    let offCount = 0;

                                <span class="truncate px-1">${m}</span>
                                ${window.isAdmin ? `
                                <div class="staff-action-btn absolute right-0 flex items-center gap-0.5 no-print">
                                    <button onclick="window.renameStaff(${gi}, ${mi})" title="重新命名" class="p-0.5 text-blue-400 bg-white/80 rounded shadow-sm"><i data-lucide="edit-2" class="w-2.5 h-2.5"></i></button>
                                    <button onclick="window.removeStaff(${gi}, ${mi})" title="隱藏人員" class="p-0.5 text-rose-400 bg-white/80 rounded shadow-sm"><i data-lucide="eye-off" class="w-2.5 h-2.5"></i></button>
                                </div>` : ''}
                            </div>
                        </td>`;
                    
                    // 修正點：rowspan 僅基於可見人員數量
                    if(mi === 0) row += `<td rowspan="${visibleMembers.length}" class="frame-a-shift text-[10px] text-slate-400 font-black">

                    </td>`;
                    
                    for(let d=1; d<=days; d++) {
                        const ds = window.toDateKey(new Date(window.currentYear, window.currentMonth, d));
                        let v = window.schedule[ds]?.[m.trim()] || ""; // 使用 trim() 確保比對精確
                        const isCoreOff = (v === '休' || v === '排休' || v === '特' || v === '補');
                        if(isCoreOff) offCount++;
                        
                        const customTag = window.customTags.find(t => t.text === v);

                        if(customTag) cellClass = "cell-custom shadow-inner";

                if(window.isAdmin && visibleMembers.length === 0) {
                     bHtml += `<tr class="group-row-${gType}"><td class="frame-b-name text-slate-300 italic px-2 text-[8px]">空分組</td><td class="frame-a-shift text-center"><button onclick="window.addStaff(${gi})" class="text-blue-400"><i data-lucide="plus-circle" class="w-4 h-4 mx-auto"></i></button></td><td colspan="${days + 1}"></td></tr>`;

                    g.members.forEach(m => {

            document.getElementById('tableFoot').innerHTML = f早 + `<td class="bg-slate-50 border-b border-l-2"></td></tr>` + f中晚 + `<td class="bg-slate-50 border-b border-l-2"></td></tr>` + f夜 + `<td class="bg-slate-50 border-b border-l-2"></td></tr>`;

        window.hDragStart = (gi, mi) => { window.draggedMember = { gi, mi }; };

            if(!window.draggedMember) return;
            const { gi: fgi, mi: fmi } = window.draggedMember;
            const member = window.staffGroups[fgi].members.splice(fmi, 1)[0];
            window.staffGroups[gi].members.splice(mi, 0, member);
            window.draggedMember = null;
            await window.savePersonnel(); window.render();
        };

        window.addStaff = async (gi) => {
            const name = prompt("請輸入員工姓名:");
            if(!name) return;
            const group = window.staffGroups[gi];
            // 若該員在隱藏名單，則恢復顯示，不新增重複名單
            if (group.hiddenMembers && group.hiddenMembers.includes(name)) {
                group.hiddenMembers = group.hiddenMembers.filter(n => n !== name);
            } else if (!group.members.includes(name)) {
                group.members.push(name);
            } else {
                alert("該人員已在目前名單中");
                return;
            }
            await window.savePersonnel(); window.render();
        };

        // 隱藏邏輯：不刪除數組內容，僅標記隱藏
        window.removeStaff = async (gi, mi) => {
            const name = window.staffGroups[gi].members[mi];
            if(confirm(`確定隱藏員工「${name}」嗎？\n(隱藏後資料仍會保留在資料庫，可隨時復原)`)) {
                if(!window.staffGroups[gi].hiddenMembers) window.staffGroups[gi].hiddenMembers = [];
                if(!window.staffGroups[gi].hiddenMembers.includes(name)) {
                    window.staffGroups[gi].hiddenMembers.push(name);
                }
                await window.savePersonnel(); window.render();
            }
        };

        window.renameStaff = async (gi, mi) => {
            const oldName = window.staffGroups[gi].members[mi];
            const newName = prompt("更換姓名 (將同步更新所有歷史紀錄):", oldName);
            if(newName && newName !== oldName) {
                window.staffGroups[gi].members[mi] = newName;
                Object.keys(window.schedule).forEach(date => {
                    if(window.schedule[date] && window.schedule[date][oldName]) {
                        window.schedule[date][newName] = window.schedule[date][oldName];
                        delete window.schedule[date][oldName];
                    }
                });
                await window.savePersonnel(); await window.saveToFirebase(); window.render();
            }
        };

        // 管理者工具介面
        window.renderAdminTools = () => {
            const box = document.getElementById('modalBox'); box.style.maxWidth = "450px";
            box.innerHTML = `
                <div class="bg-slate-900 p-4 flex items-center justify-between text-white"><div class="text-xs font-black uppercase">Admin Console</div><button onclick="window.closeModal()"><i data-lucide="x" class="w-5 h-5"></i></button></div>
                <div class="p-6 bg-white flex flex-col gap-1">
                    <button class="admin-btn" onclick="window.openTagManager()"><i data-lucide="tags" class="text-blue-500"></i> 標記工具管理</button>
                    <button class="admin-btn" onclick="window.openPosMappingManager()"><i data-lucide="briefcase" class="text-emerald-500"></i> 崗位預設值配對設定</button>
                    <button class="admin-btn" onclick="window.openHiddenManager()"><i data-lucide="eye" class="text-amber-500"></i> 隱藏人員管理 (復原)</button>
                    <button class="admin-btn" onclick="window.openPrintPreview()"><i data-lucide="printer" class="text-slate-500"></i> 輸出全月排班表</button>
                    <button class="admin-btn" onclick="window.openWeeklyPrintSelector()"><i data-lucide="calendar-days" class="text-indigo-500"></i> 輸出週期班表</button>
                    <div class="pt-4 border-t mt-2">
                        <button onclick="window.logout()" class="text-rose-500 font-black text-xs uppercase w-full py-4 bg-rose-50 rounded-xl hover:bg-rose-100 transition">Logout Admin Mode</button>
                    </div>
                </div>`;
            document.getElementById('modalOverlay').classList.remove('hidden'); lucide.createIcons();
        };

                const hidden = g.hiddenMembers || [];
                hidden.forEach((m, hi) => {
                    listHtml += `
                        <div class="flex items-center justify-between p-3 bg-slate-50 border rounded-xl mb-2">
                            <div class="flex flex-col"><span class="text-[10px] text-slate-400 font-black">${g.group}</span><span class="font-bold">${m}</span></div>
                            <button onclick="window.restoreStaff(${gi}, ${hi})" class="bg-blue-600 text-white px-4 py-1.5 rounded-lg font-black text-[10px] flex items-center gap-1"><i data-lucide="eye"></i> 復原</button>
                        </div>`;

            box.innerHTML = `
                <div class="bg-slate-800 p-4 flex items-center justify-between text-white"><div class="font-black text-sm uppercase">隱藏人員管理</div><button onclick="window.renderAdminTools()"><i data-lucide="arrow-left"></i></button></div>
                <div class="p-6 max-h-[60vh] overflow-y-auto">
                    ${listHtml || '<p class="text-center py-8 text-slate-300 italic font-bold">目前沒有隱藏中的人員</p>'}
                </div>`;

            window.render();

        window.openTagManager = () => {
            const box = document.getElementById('modalBox'); box.style.maxWidth = "450px";
            const tagsHtml = window.customTags.map((t, i) => `
                <div class="flex items-center justify-between p-2.5 bg-slate-50 rounded-xl border text-[10px]">
                    <div class="flex items-center gap-2"><div class="w-4 h-4 rounded" style="background-color: ${t.color}"></div><span class="font-bold text-slate-700">${t.text}</span></div>
                    <button onclick="window.deleteTag(${i})" class="text-rose-400 hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>`).join('');
            const colorsHtml = PRESET_COLORS.map(c => `<div onclick="window.selectTagColor('${c}', this)" class="tag-color-picker ${c === window.currentSelectedColor ? 'active' : ''}" style="background-color: ${c}"></div>`).join('');
            box.innerHTML = `
                <div class="bg-slate-800 p-4 flex items-center justify-between text-white"><div class="font-black text-sm">標記管理</div><button onclick="window.renderAdminTools()"><i data-lucide="arrow-left"></i></button></div>
                <div class="p-6 bg-white space-y-4">
                    <div class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto">${tagsHtml || '<p class="col-span-2 text-center py-4 text-slate-300 italic">無自定義標記</p>'}</div>
                    <div class="border-t pt-4">
                        <div class="flex gap-2 mb-4"><input type="text" id="newTagText" maxlength="4" placeholder="標記名稱 (如: 病假)" class="flex-1 bg-slate-50 border p-3 rounded-xl font-bold text-xs"><button onclick="window.addTag()" class="bg-slate-900 text-white px-6 rounded-xl font-black text-xs">新增</button></div>
                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl">${colorsHtml}</div>
                    </div>
                </div>`;
            lucide.createIcons();
        };

        window.addTag = async () => {
            const t = document.getElementById('newTagText').value.trim(); 
            if (!t || !auth.currentUser) return; 
            window.customTags.push({ text: t, color: window.currentSelectedColor });
            await window.fbSetDoc(window.getRef('custom_tags', 'current'), { tags: window.customTags }); window.openTagManager();
        };
        window.deleteTag = async (idx) => {
            if (!auth.currentUser) return; window.customTags.splice(idx, 1);
            await window.fbSetDoc(window.getRef('custom_tags', 'current'), { tags: window.customTags }); window.openTagManager();

            const allStaff = window.staffGroups.flatMap(g => g.members);
            const staffOptions = allStaff.map(s => `<option value="${s}">${s}</option>`).join('');
            const tableRows = Object.entries(window.posMapping).map(([person, pos]) => `

                    <td class="py-2 px-3 text-right">

                </tr>`).join('');
            box.innerHTML = `
                <div class="bg-slate-800 p-4 flex items-center justify-between text-white"><div class="font-black text-sm uppercase">崗位預設值配對</div><button onclick="window.renderAdminTools()"><i data-lucide="arrow-left"></i></button></div>
                <div class="p-6 space-y-4">
                    <div class="max-h-60 overflow-y-auto border rounded-xl">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[9px] uppercase font-black"><tr><th class="px-3 py-2">人員</th><th class="px-3 py-2">預設崗位</th><th class="px-3 py-2"></th></tr></thead>
                            <tbody>${tableRows || '<tr><td colspan="3" class="text-center py-4 text-slate-400">無資料</td></tr>'}</tbody>
                        </table>
                    </div>
                    <div class="border-t pt-4">
                        <select id="newPosStaff" class="w-full bg-slate-50 border p-3 rounded-xl mb-2 font-bold">${staffOptions}</select>
                        <div class="flex gap-2">
                            <input type="text" id="newPosName" placeholder="崗位名稱" class="flex-1 bg-slate-50 border p-3 rounded-xl font-bold">
                            <button onclick="window.addPosMapping()" class="bg-emerald-600 text-white px-6 rounded-xl font-black">新增</button>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();

        window.addPosMapping = async () => {
            const staff = document.getElementById('newPosStaff').value;
            const pos = document.getElementById('newPosName').value.trim();

            await window.fbSetDoc(window.getRef('pos_mapping', 'current'), { mapping: window.posMapping });
            window.openPosMappingManager();

            delete window.posMapping[person];
            await window.fbSetDoc(window.getRef('pos_mapping', 'current'), { mapping: window.posMapping });
            window.openPosMappingManager();
        };

        window.openWeeklyPrintSelector = () => {
            const box = document.getElementById('modalBox'); box.style.maxWidth = "400px";
            const firstDate = new Date(window.currentYear, window.currentMonth, 1);
            const lastDate = new Date(window.currentYear, window.currentMonth + 1, 0);
            box.innerHTML = `
                <div class="bg-slate-800 p-4 flex items-center justify-between text-white"><div class="font-black text-sm uppercase">週期班表輸出</div><button onclick="window.renderAdminTools()"><i data-lucide="arrow-left"></i></button></div>
                <div class="p-8 space-y-6">
                    <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">開始日期</label><input type="date" id="printStart" value="${window.toDateKey(firstDate)}" class="w-full bg-slate-50 border p-4 rounded-xl font-bold"></div>
                    <div><label class="block text-[10px] font-black text-slate-400 uppercase mb-2">結束日期</label><input type="date" id="printEnd" value="${window.toDateKey(lastDate)}" class="w-full bg-slate-50 border p-4 rounded-xl font-bold"></div>
                    <button onclick="window.generateWeeklyPrint()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl flex items-center justify-center gap-3"><i data-lucide="printer"></i> 生成並列印</button>
                </div>`;
            document.getElementById('modalOverlay').classList.remove('hidden');
            lucide.createIcons();
        };

        window.generateWeeklyPrint = () => {
            const startStr = document.getElementById('printStart').value;
            const endStr = document.getElementById('printEnd').value;
            if (!startStr || !endStr) return;
            const start = new Date(startStr); const end = new Date(endStr);
            let cardsHtml = "";
            
            const getGroupNameOfMember = (name) => {
                const grpObj = window.staffGroups.find(g => g.members.includes(name));
                return grpObj ? grpObj.group : "";
            };

            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                const ds = window.toDateKey(d);
                const dayName = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"][d.getDay()];
                const hData = window.HOLIDAY_DB[ds] || { n: "", r: false };
                const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                let offList = []; 
                let onDutyRaw = [];
                window.staffGroups.forEach(g => {
                    const hidden = g.hiddenMembers || [];
                    g.members.forEach(m => {
                        if(hidden.includes(m)) return;
                        const shift = window.schedule[ds]?.[m] || "";
                        if (['休', '排休', '特', '補'].includes(shift)) offList.push(m);
                        else if (shift) onDutyRaw.push({ name: m, time: shift });
                    });
                });

                let groupedOnDuty = [];
                let i = 0;
                while(i < onDutyRaw.length) {
                    const current = onDutyRaw[i];
                    const next = onDutyRaw[i+1];
                    const curGrp = getGroupNameOfMember(current.name);
                    const isSpecialGroup = curGrp.includes("鯰魚") || curGrp.includes("野雁");

                    if (isSpecialGroup && next && current.time === next.time && curGrp === getGroupNameOfMember(next.name)) {
                        groupedOnDuty.push({ names: [current.name, next.name], time: current.time });
                        i += 2;
                    } else {
                        groupedOnDuty.push({ names: [current.name], time: current.time });
                        i++;
                    }
                }

                const titleColor = (hData.r || isWeekend) ? 'text-rose-600' : 'text-slate-800';
                let rowHtml = ""; let cM=1, cA=1, cE=1;
                
                for (let j = 0; j < 10; j++) { 
                    const staffSet = groupedOnDuty[j] || { names: [""], time: "" };
                    const timeObj = window.formatShiftTime(staffSet.time);
                    let mM="", mA="", mE="";
                    staffSet.names.forEach(n => {
                        if(n && timeObj.startNum !== null) {
                            if(timeObj.startNum >= 800 && timeObj.startNum <= 1530) mM = `<span class="text-red-marker">${cM++}</span>`;
                            if(timeObj.startNum >= 1430 && timeObj.startNum <= 2100) mA = `<span class="text-red-marker">${cA++}</span>`;
                            if(timeObj.startNum >= 1730 && timeObj.startNum <= 2350) mE = `<span class="text-red-marker">${cE++}</span>`;
                        }
                    });

                    rowHtml += `<tr>
                        <td contenteditable="true" style="font-family: monospace;">${timeObj.display==="--"?"":timeObj.display}</td>
                        <td contenteditable="true" style="font-weight:bold;">${staffSet.names.filter(n=>n).join('、')}</td>
                        <td contenteditable="true">${staffSet.names.filter(n=>n).map(n => window.posMapping[n] || "").join('、')}</td>
                        <td contenteditable="true">${mM}</td>
                        <td contenteditable="true">${mA}</td>
                        <td contenteditable="true">${mE}</td>
                    </tr>`;
                }
                cardsHtml += `
                    <div class="weekly-card">
                        <div class="weekly-card-header"><h2 class="text-[10px] font-black ${titleColor}">${d.getMonth()+1}/${d.getDate()} (${dayName}) ${hData.n ? '<span class="text-red-marker">['+hData.n+']</span>' : ''}</h2></div>
                        <table class="weekly-table">
                            <thead><tr class="bg-slate-50"><th style="width:65px">時間</th><th style="width:100px;">人員</th><th style="width:40px">崗位</th><th style="width:18px">早</th><th style="width:18px">中</th><th style="width:18px">晚</th></tr></thead>
                            <tbody>${rowHtml}</tbody>
                        </table>
                        <div class="mt-1 text-[8px] flex-1 flex flex-col justify-between">
                            <div class="border-t border-black pt-1">休：<span class="font-bold">${offList.join('、') || '無'}</span></div>
                            <div class="text-right font-bold">券：_______</div>
                        </div>
                    </div>`;
            }
            const box = document.getElementById('modalBox'); box.style.maxWidth = "1400px"; box.style.width = "99%";
            box.innerHTML = `<div class="bg-slate-900 p-4 flex items-center justify-between text-white no-print"><button onclick="window.openWeeklyPrintSelector()"><i data-lucide="arrow-left"></i></button><button onclick="window.print()" class="bg-blue-600 px-6 py-2 rounded-lg text-xs flex items-center gap-2 font-black shadow-xl"><i data-lucide="printer"></i> 列印週期班表</button></div><div class="max-h-[85vh] overflow-auto bg-slate-100 p-4"><div class="weekly-grid flex flex-wrap gap-[6px] justify-center">${cardsHtml}</div></div>`;
            lucide.createIcons();
        };

        window.openPrintPreview = () => {
            const days = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
            let tableHtml = `<div class="print-preview-container"><div class="text-center mb-4"><h1 class="text-xl font-black">${window.currentYear}年${window.currentMonth+1}月份 排班表 (${window.currentStore})</h1></div><table style="width:100%; border-collapse: collapse; border: 2px solid #000;">`;
            let h0 = `<tr><th rowspan="3" style="width:70px; border:2px solid #000;">人員</th><th rowspan="3" style="width:40px; border:2px solid #000;">班別</th>`;
            let h1 = `<tr>`; let h2 = `<tr>`;
            for(let d=1; d<=days; d++) {
                const date = new Date(window.currentYear, window.currentMonth, d);
                const ds = window.toDateKey(date);
                const hData = window.HOLIDAY_DB[ds] || { n: "", r: false };
                const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                const headerBg = (hData.r || isWeekend) ? '#fff1f2' : 'white';
                h0 += `<th style="height:50px; border:2px solid #000; background-color:${headerBg} !important;"><div class="vertical-holiday">${hData.n}</div></th>`;
                h1 += `<th style="font-size:8px; border:2px solid #000; background-color:${headerBg} !important;">${["日","一","二","三","四","五","六"][date.getDay()]}</th>`;
                h2 += `<th style="font-size:10px; border:2px solid #000; background-color:${headerBg} !important;">${d}</th>`;
            }
            tableHtml += `<thead>` + h0 + `<th rowspan="3" style="width:30px; border:2px solid #000;">休</th></tr>` + h1 + `</tr>` + h2 + `</tr></thead><tbody>`;
            window.staffGroups.forEach((g) => {
                const gType = g.group.substring(0,1);
                const hidden = g.hiddenMembers || [];
                const visible = g.members.filter(m => !hidden.includes(m));
                visible.forEach((m, mi) => {
                    let offCount = 0; tableHtml += `<tr><td style="font-weight:bold; font-size:11px; border:2px solid #000; text-align:center;">${m}</td>`;
                    if(mi === 0) tableHtml += `<td rowspan="${visible.length}" style="font-weight:900; border:2px solid #000; text-align:center;">${gType}</td>`;
                    for(let d=1; d<=days; d++) {
                        const ds = window.toDateKey(new Date(window.currentYear, window.currentMonth, d));
                        const v = window.schedule[ds]?.[m] || "";
                        const customTag = window.customTags.find(t => t.text === v);
                        let cellBg = "white", cellColor = "black";
                        if (['休', '排休', '特', '補'].includes(v)) { cellBg = (v==='休'||v==='排休') ? "#fb7185" : "#64748b"; cellColor = "white"; offCount++; }
                        else if (customTag) { cellBg = customTag.color; cellColor = "white"; }
                        else if (v === "0800-1530") cellBg = "#dcfce7"; else if (v === "1630-1830") cellBg = "#fef9c3"; else if (v === "1930-2350") cellBg = "#dbeafe";
                        tableHtml += `<td style="font-size:9px; border:1px solid #000; background-color:${cellBg} !important; color:${cellColor} !important; text-align:center;">${v}</td>`;
                    }
                    tableHtml += `<td style="font-weight:bold; border:2px solid #000; text-align:center;">${offCount}</td></tr>`;
                });
            });
            tableHtml += `</tbody></table></div>`;
            const box = document.getElementById('modalBox'); box.style.maxWidth = "1400px"; box.style.width = "98%";
            box.innerHTML = `<div class="bg-slate-900 p-4 flex items-center justify-between text-white no-print"><button onclick="window.renderAdminTools()"><i data-lucide="arrow-left"></i></button><button onclick="window.print()" class="bg-blue-600 px-6 py-2 rounded-lg text-xs flex items-center gap-2"><i data-lucide="printer"></i> 列印全月班表</button></div><div class="max-h-[80vh] overflow-auto bg-slate-100 p-4">${tableHtml}</div>`;
            document.getElementById('modalOverlay').classList.remove('hidden');
            lucide.createIcons();
        };

        window.formatShiftTime = (raw) => {
            if(!raw || raw === "--") return { display: "--", startNum: null };
            let s = raw.split('-')[0].replace(':', '').trim(); 
            if(s.length < 4) return { display: raw, startNum: null };
            let hh = parseInt(s.substring(0,2));
            let mm = parseInt(s.substring(2,4));
            let startT = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
            let totalMin = hh * 60 + mm + 510;
            let endT = `${String(Math.floor(totalMin/60)%24).padStart(2,'0')}:${String(totalMin%60).padStart(2,'0')}`;
            return { display: `${startT}~${endT}`, startNum: parseInt(s) };
        };

        window.renderToolbar = () => {
            const core = [{ id: "CLEAR", label: "清", bg: "bg-slate-100 text-slate-400" }, { id: "休", label: "休", bg: "cell-off" }, { id: "排休", label: "排休", bg: "cell-off" }, { id: "特", label: "特", bg: "bg-slate-500 text-white" }, { id: "補", label: "補", bg: "bg-slate-500 text-white" }];
            let html = core.map(t => `<button onclick="window.selectedTool='${t.id}'; window.renderToolbar();" class="px-2.5 py-1.5 rounded-lg text-[9px] font-black transition-all flex-shrink-0 ${t.bg} ${window.selectedTool === t.id ? 'ring-2 ring-slate-900 ring-offset-1 scale-105' : 'opacity-60'}">${t.label}</button>`).join('');
            if(window.isAdmin) {
                window.customTags.forEach(t => {
                    html += `<button onclick="window.selectedTool='${t.text}'; window.renderToolbar();" class="px-2.5 py-1.5 rounded-lg text-[9px] font-black text-white transition-all flex-shrink-0 ${window.selectedTool === t.text ? 'ring-2 ring-slate-900 ring-offset-1 scale-105' : 'opacity-60'}" style="background-color: ${t.color}">${t.text}</button>`;
                });
            }
            document.getElementById('toolbar').innerHTML = html;
        };

        window.cellClick = async (ds, m) => {
            if(!window.isAdmin && !!window.lockedMonths[`${window.currentYear}-${window.currentMonth + 1}`]) return;
            if(!window.schedule[ds]) window.schedule[ds] = {};
            window.pushToUndo();
            if(window.selectedTool === "CLEAR") delete window.schedule[ds][m]; else window.schedule[ds][m] = window.selectedTool;
            await window.saveToFirebase(); window.render();
        };

        window.handleLoginBtnClick = () => { if(window.isAdmin) window.renderAdminTools(); else window.openLogin(); };

        window.openLogin = () => {
            const box = document.getElementById('modalBox');
            box.innerHTML = `<div class="p-8 text-center"><h3 class="text-xl font-black text-slate-800">管理者驗證</h3><input type="password" id="pwdIn" class="w-full mt-6 bg-slate-50 border border-slate-200 rounded-xl py-5 text-center text-4xl font-black outline-none" onkeydown="if(event.key==='Enter') window.verify()"><div class="grid grid-cols-2 gap-3 mt-8"><button onclick="window.closeModal()" class="py-4 font-bold text-slate-400 text-sm">取消</button><button onclick="window.verify()" class="bg-blue-600 text-white py-4 rounded-xl font-black text-sm">確認</button></div></div>`;
            document.getElementById('modalOverlay').classList.remove('hidden');
            setTimeout(() => document.getElementById('pwdIn').focus(), 100);
        };

        window.verify = () => {
            if(document.getElementById('pwdIn').value === window.PASS_MASTER) {
                window.isAdmin = true; window.closeModal(); window.renderAdminTools(); window.render(); window.renderToolbar();
            } else { alert("金鑰錯誤"); }
        };

        window.handleLockClick = () => { if (!window.isAdmin) window.openLogin(); else { const key = `${window.currentYear}-${window.currentMonth + 1}`; window.lockedMonths[key] = !window.lockedMonths[key]; if (auth.currentUser) window.fbSetDoc(window.getRef('lock_state', 'current'), { data: window.lockedMonths }); } };
        window.logout = () => { window.isAdmin = false; window.closeModal(); window.render(); window.renderToolbar(); };
        window.closeModal = () => { document.getElementById('modalOverlay').classList.add('hidden'); };
        
        window.saveNotes = async (field) => { 
            if (!auth.currentUser) return; 
            const ref = window.getRef('footer_notes', `current_${window.currentStore}`); 
            const elId = field === 'general' ? 'noteGeneral' : (field === 'staff' ? 'noteStaff' : 'noteAdmin');
            const val = document.getElementById(elId).innerText;
            await window.fbSetDoc(ref, { [field]: val }, { merge: true }); 
        };
        
        window.changeMonth = async (v) => { 
            window.currentMonth += v; 
            if(window.currentMonth>11){window.currentMonth=0;window.currentYear++;} 
            if(window.currentMonth<0){window.currentMonth=11;window.currentYear--;} 
            window.staffGroups = [];
            window.render(); 
            await window.loadData(); 
        };
    </script>
</body>
</html>
